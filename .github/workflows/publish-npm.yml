name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Determine version bump type from merge commit message
      - name: Determine version bump
        id: bump
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qi '\[major\]'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$COMMIT_MSG" | grep -qi '\[minor\]'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      # Bump version in parser
      - name: Bump parser version
        working-directory: packages/parser
        run: npm version ${{ steps.bump.outputs.type }} --no-git-tag-version

      # Sync version to react
      - name: Bump react version
        working-directory: packages/react
        run: npm version ${{ steps.bump.outputs.type }} --no-git-tag-version

      # Read the new version for tagging
      - name: Get new version
        id: version
        run: echo "version=$(node -p "require('./packages/parser/package.json').version")" >> "$GITHUB_OUTPUT"

      # Commit version bump and tag
      - name: Commit version bump
        run: |
          git add packages/parser/package.json packages/react/package.json
          git commit -m "v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin main --tags

      # Build and publish parser first (react depends on it)
      - name: Install parser dependencies
        working-directory: packages/parser
        run: npm install

      - name: Build parser
        working-directory: packages/parser
        run: npm run build

      - name: Publish parser
        working-directory: packages/parser
        run: npm publish --access public --provenance

      # Fix file: dependency before publishing react
      - name: Prepare react package
        working-directory: packages/react
        run: |
          VERSION=$(node -p "require('../parser/package.json').version")
          sed -i "s|\"@markdown2ui/parser\": \"file:../parser\"|\"@markdown2ui/parser\": \"^${VERSION}\"|" package.json

      - name: Install react dependencies
        working-directory: packages/react
        run: npm install

      - name: Build react
        working-directory: packages/react
        run: npm run build

      - name: Publish react
        working-directory: packages/react
        run: npm publish --access public --provenance
