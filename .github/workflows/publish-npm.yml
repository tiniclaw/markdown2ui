name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Skip if the push is a version bump commit from this workflow
      - name: Check if version bump commit
        id: check
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qP '^v\d+\.\d+\.\d+$'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Determine version bump type from merge commit message
      - name: Determine version bump
        if: steps.check.outputs.skip == 'false'
        id: bump
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qi '\[major\]'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$COMMIT_MSG" | grep -qi '\[minor\]'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      # Bump version in both packages (locally, for publishing)
      - name: Bump parser version
        if: steps.check.outputs.skip == 'false'
        working-directory: packages/parser
        run: npm version ${{ steps.bump.outputs.type }} --no-git-tag-version

      - name: Bump react version
        if: steps.check.outputs.skip == 'false'
        working-directory: packages/react
        run: npm version ${{ steps.bump.outputs.type }} --no-git-tag-version

      - name: Get new version
        if: steps.check.outputs.skip == 'false'
        id: version
        run: echo "version=$(node -p "require('./packages/parser/package.json').version")" >> "$GITHUB_OUTPUT"

      # Build and publish parser first (react depends on it)
      - name: Install parser dependencies
        if: steps.check.outputs.skip == 'false'
        working-directory: packages/parser
        run: npm install

      - name: Build parser
        if: steps.check.outputs.skip == 'false'
        working-directory: packages/parser
        run: npm run build

      - name: Publish parser
        if: steps.check.outputs.skip == 'false'
        working-directory: packages/parser
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Fix file: dependency before publishing react
      - name: Prepare react package
        if: steps.check.outputs.skip == 'false'
        working-directory: packages/react
        run: |
          VERSION=$(node -p "require('../parser/package.json').version")
          sed -i "s|\"@markdown2ui/parser\": \"file:../parser\"|\"@markdown2ui/parser\": \"^${VERSION}\"|" package.json

      - name: Install react dependencies
        if: steps.check.outputs.skip == 'false'
        working-directory: packages/react
        run: npm install

      - name: Build react
        if: steps.check.outputs.skip == 'false'
        working-directory: packages/react
        run: npm run build

      - name: Publish react
        if: steps.check.outputs.skip == 'false'
        working-directory: packages/react
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Create a GitHub Release with the version tag
      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "v${{ steps.version.outputs.version }}" --generate-notes --title "v${{ steps.version.outputs.version }}"
