name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install parser dependencies
        working-directory: packages/parser
        run: npm install

      - name: Build parser
        working-directory: packages/parser
        run: npm run build

      - name: Test parser
        working-directory: packages/parser
        run: npm test

      - name: Install react dependencies
        working-directory: packages/react
        run: npm install

      - name: Build react
        working-directory: packages/react
        run: npm run build

      - name: Install playground dependencies
        working-directory: packages/playground
        run: npm install

      - name: Build playground
        working-directory: packages/playground
        run: npx vite build
